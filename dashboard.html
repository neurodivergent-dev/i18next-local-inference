<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>i18n Dashboard</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8C%8D%3C/text%3E%3C/svg%3E" />
<script>
  // Apply the theme before first paint: saved choice wins, otherwise follow the OS
  (function () {
    var t = localStorage.getItem("i18n-dash-theme");
    if (t !== "light" && t !== "dark") {
      t = window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
    }
    document.documentElement.dataset.theme = t;
  })();
</script>
<link rel="stylesheet" href="./dashboard.css" />
</head>
<body>
<div id="root"></div>
<script type="module" src="./dashboard-client.tsx"></script>
</body>
</html>
